steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/frontend-ok-action', '.']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/frontend-ok-action']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - frontend-ok-action
      - --image=gcr.io/$PROJECT_ID/frontend-ok-action
      - --region=southamerica-west1
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
